name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token (OpenSSF Scorecard: Token-Permissions)
permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Python versions to test against. Initially only testing the boundaries of supported version ranges, due to the limited project scope and complexity.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile (no syntax errors)
        run: python -m compileall -q grantguard grantguard.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
