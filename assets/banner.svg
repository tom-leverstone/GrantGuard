<svg xmlns="http://www.w3.org/2000/svg" width="2112" height="512" viewBox="0 0 2112 512" role="img" aria-labelledby="title desc">
  <title id="title">GrantGuard GitHub banner</title>
  <desc id="desc">Dark Vanta-inspired purple banner with grid, dot matrix, shield check icon, GrantGuard title, and subtitle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b004a"/>
      <stop offset="0.38" stop-color="#10071f"/>
      <stop offset="0.72" stop-color="#180833"/>
      <stop offset="1" stop-color="#8728ff"/>
    </linearGradient>
    <radialGradient id="rightGlow" cx="88%" cy="72%" r="45%">
      <stop offset="0" stop-color="#9a4dff" stop-opacity="0.7"/>
      <stop offset="0.48" stop-color="#6a2cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="5%" cy="72%" r="35%">
      <stop offset="0" stop-color="#7b2cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#8b55d9" stroke-width="1" opacity="0.28"/>
    </pattern>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#a765ff" opacity="0.75"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="2112" height="512" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="2112" height="512" rx="24" fill="url(#rightGlow)"/>
  <rect x="0" y="0" width="2112" height="512" rx="24" fill="url(#leftGlow)"/>

  <rect x="0" y="0" width="560" height="512" fill="url(#grid)" opacity="0.78"/>
  <rect x="1450" y="55" width="520" height="390" fill="url(#dots)" opacity="0.55"/>
  <rect x="215" y="295" width="470" height="170" fill="url(#dots)" opacity="0.35"/>

  <path d="M0 427 C360 392 600 456 908 415 C1210 373 1430 421 1742 392 C1890 379 2025 391 2112 374 L2112 512 L0 512 Z" fill="#6b2cff" opacity="0.08"/>

  <g filter="url(#softShadow)" transform="translate(525 154)">
    <path d="M96 0 C64 24 31 33 0 39 L0 87 C0 147 37 186 96 216 C155 186 192 147 192 87 L192 39 C161 33 128 24 96 0 Z" fill="none" stroke="#ffffff" stroke-width="10" stroke-linejoin="round"/>
    <path d="M55 113 L84 142 L139 84" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#textShadow)">
    <text x="780" y="252" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="122" font-weight="800" letter-spacing="-4">GrantGuard</text>
    <text x="785" y="316" fill="#dfd6f1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="500">Audit and clean your Claude Code permission allowlist</text>
  </g>
</svg>
